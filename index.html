<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nolls</title>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0f1a,#1e1e2f);color:#fff}

/* FIXED SIDEBAR */
.sidebar{
width:220px;
background:rgba(0,0,0,0.7);
padding:15px;
height:100vh;
position:fixed;
left:0;
top:0;
}

.main{
margin-left:220px;
padding:20px;
}

header{text-align:center;padding:20px}
.container{max-width:700px;margin:auto}
.card{background:rgba(255,255,255,0.05);border-radius:16px;padding:15px;margin:15px 0}
input,textarea{width:100%;margin:5px 0;padding:10px;border:none;border-radius:10px;background:#2c2c3e;color:white}
button{background:#00cec9;border:none;padding:8px;border-radius:10px;color:white;cursor:pointer;margin:3px}
.avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;margin-right:10px}
.post-header{display:flex;align-items:center;cursor:pointer}
.comment{display:flex;align-items:center;margin-top:5px}
.menu-btn{display:block;width:100%;margin-bottom:10px}
</style>
</head>
<body>

<div class="sidebar">
<button class="menu-btn" onclick="showSection('feed')">🏠 Лента</button>
<button class="menu-btn" onclick="showSection('profile')">👤 Профиль</button>
<button class="menu-btn" onclick="showSection('friends')">👥 Друзья</button>
</div>

<div class="main">
<header>
<h1>Nolls</h1>
</header>

<div class="container">

<div id="profileSection" class="card" style="display:none">
<h2>Профиль</h2>
<input id="name" placeholder="Имя">
<textarea id="bio" placeholder="О себе"></textarea>
<input type="file" id="avatarInput">
<button onclick="saveProfile()">Сохранить</button>
</div>

<div id="friendsSection" class="card" style="display:none">
<h2>Друзья</h2>
<div id="friendsList">Пока нет друзей</div>
</div>

<div id="viewProfileSection" class="card" style="display:none"></div>

<div id="feedSection">
<div class="card">
<h2>Создать пост</h2>
<textarea id="postText"></textarea>
<button onclick="addPost()">Опубликовать</button>
</div>
<div id="posts"></div>
</div>

</div>
</div>

<script>
let posts = JSON.parse(localStorage.getItem('posts')) || [];
let profile = JSON.parse(localStorage.getItem('profile')) || {};
let liked = JSON.parse(localStorage.getItem('liked')) || [];
let reposted = JSON.parse(localStorage.getItem('reposted')) || [];

// FIX STRUCTURE
posts = posts.map(p => ({
  id: p.id || Date.now(),
  text: p.text || '',
  likes: p.likes || 0,
  reposts: p.reposts || 0,
  comments: Array.isArray(p.comments) ? p.comments : []
}));

window.onload = () => {
  if(profile.name) document.getElementById('name').value = profile.name;
  if(profile.bio) document.getElementById('bio').value = profile.bio;
};

function saveProfile(){
profile.name=document.getElementById('name').value;
profile.bio=document.getElementById('bio').value;

let file=document.getElementById('avatarInput').files[0];
if(file){
let r=new FileReader();
r.onload=e=>{
profile.avatar=e.target.result;
localStorage.setItem('profile',JSON.stringify(profile));
renderPosts();
};
r.readAsDataURL(file);
}else{
localStorage.setItem('profile',JSON.stringify(profile));
renderPosts();
}
}

function addPost(){
let text=document.getElementById('postText').value;
if(!text)return;

posts.unshift({
  id:Date.now(),
  text,
  comments:[],
  likes:0,
  reposts:0
});

localStorage.setItem('posts',JSON.stringify(posts));
renderPosts();
}

function likePost(id){
if(liked.includes(id)) return;
liked.push(id);

let p=posts.find(p=>p.id===id);
if(p) p.likes++;

localStorage.setItem('liked',JSON.stringify(liked));
localStorage.setItem('posts',JSON.stringify(posts));
renderPosts();
}

// FIX REPOST
function repost(id){
if(reposted.includes(id)){
alert('Ты уже репостнул');
return;
}
reposted.push(id);

let p=posts.find(p=>p.id===id);
if(p) p.reposts++;

localStorage.setItem('reposted',JSON.stringify(reposted));
localStorage.setItem('posts',JSON.stringify(posts));
renderPosts();
}

function addComment(id){
let input=document.getElementById('c'+id);
if(!input.value)return;

let p=posts.find(p=>p.id===id);
p.comments.push(input.value);

localStorage.setItem('posts',JSON.stringify(posts));
renderPosts();
}

function openProfile(name){
let html = `
<h2>${name}</h2>
<p>${profile.bio || 'Нет описания'}</p>
`;
document.getElementById('viewProfileSection').innerHTML = html;
showSection('view');
}

function renderPosts(){
let html='';

posts.forEach(p=>{
const comments = Array.isArray(p.comments)?p.comments:[];

html+=`<div class='card'>
<div class='post-header' onclick="openProfile('${profile.name||'User'}')">
${profile.avatar?`<img src='${profile.avatar}' class='avatar'>`:''}
<b>${profile.name||'User'}</b>
</div>
<p>${p.text}</p>
<button onclick='likePost(${p.id})'>❤️ ${p.likes}</button>
<button onclick='repost(${p.id})'>🔁 ${p.reposts}</button>
<input id='c${p.id}' placeholder='Комментарий'>
<button onclick='addComment(${p.id})'>💬</button>
${comments.map(c=>`<div class='comment'>
${profile.avatar?`<img src='${profile.avatar}' class='avatar'>`:''}
<span>${c}</span>
</div>`).join('')}
</div>`;
});

if(posts.length===0){
html = "<div class='card'>Нет постов 👆</div>";
}

document.getElementById('posts').innerHTML=html;
}

function showSection(sec){
document.getElementById('feedSection').style.display = sec==='feed'?'block':'none';
document.getElementById('profileSection').style.display = sec==='profile'?'block':'none';
document.getElementById('friendsSection').style.display = sec==='friends'?'block':'none';
document.getElementById('viewProfileSection').style.display = sec==='view'?'block':'none';
}

renderPosts();
</script>

</body>
</html>
